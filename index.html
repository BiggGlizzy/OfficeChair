<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <title>3D Office Chair Simulator</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #startScreen{
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #8698a6;
      background: linear-gradient(90deg,rgba(134, 152, 166, 1) 0%, rgba(122, 163, 138, 1) 100%, rgba(237, 221, 83, 1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start{
      text-align: center;
      color: chocolate;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .start h1{
      font-size: clamp(72px,12vw,140px);
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 4px 40px #8698a6;
    }

    .subtitle{
      font-size: 15px;
      color: white;
    }

    #startButton{
      margin-top: 12px;
      padding: 16px 52px;
      font-size: 24px;
      background : green;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    #startButton:hover{
      background: lightgreen;
      transform: scale(1.04);
    }

    .controls{
      margin-top: 8px;
      display: flex;
      gap: 24px;
      font-size: 12px;
      color : gray;
      letter-spacing: 1px;
    }

    #ui{
      position: fixed; bottom: 24px;
      left: 0px; right: 0px;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 28px; pointer-events: none;
      z-index: 50;
    }

    #speed{
      color: green;
      border: 1px solid brown;
      border-radius: 8px;
      padding: 24px 36px;
      display: flex;
      flex-direction: column;
      background: green;
      gap: 12px;
      min-width: 280px;
    }

    #speedLabel{
      font-size: 20px;
      color: tan;
      font-weight: 600;
    }

    #speedBarTracking{
      width: 100%; height: 12px;
      background: saddlebrown;
      border-radius: 3px;
      overflow: hidden;
    }

    #speed-bar{
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.1s;
      background: lightgreen;
    }

    #speedValue{
      font-size: 44px;
      font-weight: 600;
      color: tan;
    }

    #controls{
      background: green;
      border: 1px solid brown;
      border-radius: 8px;
      padding: 24px 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-row{
      font-size: 20px;
      color: tan;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #exitButton{
      flex: 1;
      margin-top: 8px;
      padding: 12px;
      font-size: 18px;
      background: darkred;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    #exitButton:hover{
      background: red;
      transform: scale(1.04);
    }

    #escLabel{
      position: fixed;
      top: 24px;
      left: 24px;
      pointer-events: none;
      font-size: 16px;
      color: white;
      padding: 10px 20px;
      letter-spacing: 1px;
    }
    #menuButtons{
      display: flex;
      gap: 12px;
    }

    #closeSettings{
      flex: 1;
      margin-top: 8px;
      padding: 12px;
      font-size: 18px;
      background: darkred;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    #closeSettings:hover{
      background: red;
      transform: scale(1.04);
    }

    #settings{
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
    }

    #settings.open{
      display: flex;
    }

    #settings h2{
      font-size: 28px;
      color: white;
      margin: 0;
      letter-spacing: 2px;
    }

    #settingsInner{
      background: #1a1a1a;
      border: 1px solid brown;
      border-radius: 12px;
      padding: 36px 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 360px;
      color: tan;
    }

    .setting-row{
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .setting-row label{
      font-size: 14px;
      letter-spacing: 1px;
      color: tan;
      text-transform: uppercase;
    }

    .setting-row input[type="range"]{
      width: 100%;
      accent-color: green;
    }
    .setting-row input[type="color"]{
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background:none;
    }

    .setting-value{
      font-size: 13px;
      color: gray;
    }



  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
        "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.7/build/index.module.js",
        "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.0/build/index.module.js"
      }
    }
  </script>
</head>

<body>
  <!-- Start Screen -->
  <div id="startScreen">
    <div class = 'start'>
      <h1>3D Office Chair Simulator</h1>
      <p class="subtitle">Roll around the office!</p>
      <button id="startButton">Start</button>
      <div class="contols">
        <span>W A S D - move</span>
        <span>Drag - orbit camera</span>
        <span>Scroll - zoom</span>
      </div>
    </div>
  </div>

  <!-- Simple UI (optional, good for marks) -->
  <div id="ui">
    <div id="speed">
      <div id="speedLabel">SPEED</div>
      <div id="speedBarTracking"><div id="speed-bar"></div></div>
      <div id="speedValue">0.00</div>
    </div>
    <div id="escLabel">[ESC] Settings</div>
    <div id="controls">
      <div class="control-row">W - Forward </div>
      <div class="control-row">S - Reverse </div>
      <div class="control-row"> A D - Turn </div>
    </div>
  </div>

  <div id="settings">
    <div id="settingsInner">
      <h2>Settings</h2>

      <div class="setting-row">
        <label>Light Colour</label>
        <input type="color" id="lightColour" value="#ffffff">
      </div>

      <div class="setting-row">
        <label>Brightness</label>
        <input type="range" id="lightBrightness" min="0" max="5" step="0.1" value="1">
        <span class="setting-value" id="lightBrightnessValue">1.0</span>
      </div>

      <div class="setting-row">
        <label>Light Angle</label>
        <input type="range" id="lightAngle" min="0" max="360" step="1" value="45°">
        <span class="setting-value" id="angleValue">45.0</span>
      </div>

      <div id="menuButtons">
        <button id="closeSettings">Close</button>
        <button id="exitButton">Exit to Menu</button>
      </div>
    </div>
  </div>
  <!-- Import Three.js via CDN -->
  <script type="module">
    // import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';


    // Import your scene file
    import './src/ui.js';
    import './src/scene.js';
    import './src/controller.js';
  </script>

</body>
</html>
